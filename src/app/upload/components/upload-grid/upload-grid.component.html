@for (photo of photos(); track photo) {
  <div class="photo" [matBadge]="getBadgeCount(photo)" [matTooltip]="getTooltip(photo)">
    @if (!previews[photo.name]) {
      <app-skeleton />
    }
    @if (previews[photo.name]) {
      <img [src]="previews[photo.name]" alt="" />
    }
    <button mat-icon-button (click)="removeFile.emit(photo)"><mat-icon>delete</mat-icon></button>
  </div>
}
