<app-title-section title="Events">
  @if (accountService.hasPermissions('events:manage') | async) {
    <button mat-stroked-button (click)="createEvent()">
      <mat-icon>add</mat-icon>
      NEW
    </button>
  }
</app-title-section>

<cdk-virtual-scroll-viewport scrollWindow [itemSize]="309" appendOnly>
  <app-event
    *cdkVirtualFor="let item of dataSource"
    [event]="item.event"
    [albums]="item.albums"
    [canSeeAllAlbums]="(accountService.canManageAlbums$ | async)! || (accountService.canUpload$ | async)!" />
</cdk-virtual-scroll-viewport>
