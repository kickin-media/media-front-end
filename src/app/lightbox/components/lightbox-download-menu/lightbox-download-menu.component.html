@let photoValue = photo();

@if (photoValue) {
  <button mat-icon-button [matMenuTriggerFor]="menu" matTooltip="Download photo...">
    <mat-icon>download</mat-icon>
  </button>
  <mat-menu #menu="matMenu">
    <button mat-menu-item (click)="downloadService.downloadPhoto(photoValue, 'small', filename)">
      <mat-icon>photo_size_select_small</mat-icon>
      Small
      <span class="hint">400px</span>
    </button>
    <button mat-menu-item (click)="downloadService.downloadPhoto(photoValue, 'medium', filename)">
      <mat-icon>photo_size_select_large</mat-icon>
      Medium
      <span class="hint">800px</span>
    </button>
    <button mat-menu-item (click)="downloadService.downloadPhoto(photoValue, 'large', filename)">
      <mat-icon>photo_size_select_actual</mat-icon>
      Large
      <span class="hint">2048px</span>
    </button>
    @if (canDownload$ | async) {
      <mat-divider />
      <button mat-menu-item (click)="downloadService.downloadOriginal(photoValue, filename)">
        <mat-icon>raw_on</mat-icon>
        Original
        <span class="hint">Without watermark</span>
      </button>
    }
  </mat-menu>
}
