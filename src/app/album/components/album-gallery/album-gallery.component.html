@if (processingCount) {
  <p class="note">
    <mat-icon>info</mat-icon>
    <b>{{ processingCount }}</b> photo(s) are still being processed...
  </p>
}

@for (photo of photos(); track photo) {
  <a
    [routerLink]="selectedPhotosStore.selectionMode() ? undefined : getPhotoUrl(photo)"
    (click)="onClickPhoto(photo, $event)"
    [ngClass]="{ selected: selectedPhotosStore.selectionMode() && selectedPhotosStore.entityMap()[photo.id]?.selected }"
    style="--w: 100; --h: 100">
    <!--suppress AngularNgOptimizedImage -->
    <img [src]="photo.img_urls.small" (load)="onImageLoad($event)" alt="" loading="lazy" />
  </a>
}
